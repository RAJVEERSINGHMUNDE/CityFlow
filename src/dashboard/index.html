<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <title>CityFlow Digital Twin — Event-Driven Congestion Simulator</title>
    <meta name="description" content="CityFlow uses graph AI to simulate event-driven traffic congestion and recommend optimal barricading and diversion plans for Bengaluru." />
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('cityflow-theme');
          var theme = stored || 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage unavailable — stay on default light theme
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
